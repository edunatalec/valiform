name: valiform
description: >
  A Flutter form validation library built on Validart. Provides reactive state
  management, typed fields, and seamless Form widget integration.
version: 2.1.0
repository: https://github.com/edunatalec/valiform

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=1.17.0'

dependencies:
  flutter:
    sdk: flutter

  validart: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:

topics:
  - form
  - validation
  - flutter
  - form-validation
